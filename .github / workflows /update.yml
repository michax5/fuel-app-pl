
name: Update Data Daily

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
          with:
            python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      - name: Run pipeline
        run: python pipeline.py
